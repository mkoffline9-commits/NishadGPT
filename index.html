<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>NishadGPT</title>

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
  margin: 0;
}

/* Header */
header {
  background: #111;
  padding: 15px;
  font-size: 20px;
}

/* About */
#about {
  padding: 15px;
  border-bottom: 1px solid #444;
}

/* Chat Box */
#chat {
  width: 90%;
  margin: auto;
  height: 50vh;
  overflow-y: auto;
  border: 1px solid #444;
  padding: 10px;
}

/* Input Area */
#inputArea {
  margin: 10px;
}

input {
  width: 65%;
  padding: 10px;
}

button {
  padding: 10px;
  background: green;
  color: white;
  border: none;
  cursor: pointer;
}
</style>

</head>
<body>

<header>🤖 NishadGPT</header>

<!-- About Section -->
<div id="about">
  <h3>About Me</h3>
  <p>
    मेरा नाम Mukesh Nishad है। यह एक फ्री ऑनलाइन AI टूल है, 
    जहाँ आप सवाल पूछ सकते हैं और तुरंत जवाब पा सकते हैं।
  </p>
</div>

<!-- Chat -->
<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Type here...">
  <button onclick="send()">Send 🚀</button>
</div>

<script>
async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const text = input.value;
  if (!text) return;

  chat.innerHTML += "<p><b>You:</b> " + text + "</p>";

  input.value = "";

  const res = await fetch("/api", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ text })
  });

  const data = await res.json();

  chat.innerHTML += "<p><b>AI:</b> " + data.reply + "</p>";

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
